<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        jp: ['Noto Sans JP', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0a0612',
                            card: '#130e20',
                            purple: '#7c3aed',
                            'purple-light': '#a855f7',
                            pink: '#ec4899',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.brand.dark');
            color: white;
        }
    </style>
</head>
<body class="min-h-screen antialiased bg-brand-dark text-gray-100 selection:bg-brand-purple selection:text-white">

    {% if user.is_authenticated %}
    <nav class="border-b border-gray-800 bg-brand-dark/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <span class="text-xl font-bold">Kaku</span>
                    <span class="font-jp text-brand-purple-light text-sm">かく</span>
                    <span class="ml-4 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-brand-purple/20 text-brand-purple-light border border-brand-purple/30">Admin</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-400">{{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-sm text-gray-400 hover:text-white px-3 py-1.5 rounded-lg border border-gray-800 hover:border-gray-600 transition-colors">Sign out</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="{% if user.is_authenticated %}max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8{% else %}min-h-screen flex items-center justify-center{% endif %}">
        
        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="p-4 rounded-xl {% if message.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% else %}bg-green-500/10 text-green-400 border border-green-500/20{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

</body>
</html>
